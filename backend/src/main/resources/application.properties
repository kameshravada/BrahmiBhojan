spring.application.name=brahmibhojan-backend

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:brahmibhojan}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

#flyway configuration

#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-version=1

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

auth.otp.length=${AUTH_OTP_LENGTH:6}
auth.otp.expiry-seconds=${AUTH_OTP_EXPIRY_SECONDS:300}
auth.otp.max-attempts=${AUTH_OTP_MAX_ATTEMPTS:5}
auth.otp.request-cooldown-seconds=${AUTH_OTP_REQUEST_COOLDOWN_SECONDS:60}
auth.otp.hash-pepper=${AUTH_OTP_HASH_PEPPER:change-me-in-prod}
auth.otp.return-otp-in-response=${AUTH_OTP_RETURN_IN_RESPONSE:false}
auth.otp.rate-limit.window-seconds=${AUTH_OTP_RATE_LIMIT_WINDOW_SECONDS:3600}
auth.otp.rate-limit.mobile.max-requests=${AUTH_OTP_RATE_LIMIT_MOBILE_MAX_REQUESTS:5}
auth.otp.rate-limit.ip.max-requests=${AUTH_OTP_RATE_LIMIT_IP_MAX_REQUESTS:20}
auth.otp.rate-limit.device.max-requests=${AUTH_OTP_RATE_LIMIT_DEVICE_MAX_REQUESTS:10}
auth.otp.rate-limit.verify-device.max-attempts=${AUTH_OTP_RATE_LIMIT_VERIFY_DEVICE_MAX_ATTEMPTS:25}
auth.refresh-token.expiry-seconds=${AUTH_REFRESH_TOKEN_EXPIRY_SECONDS:2592000}
auth.refresh-token.hash-pepper=${AUTH_REFRESH_TOKEN_HASH_PEPPER:change-me-refresh-pepper}

inventory.default-available-quantity=${INVENTORY_DEFAULT_AVAILABLE_QUANTITY:100}

catalog.seed.enabled=${CATALOG_SEED_ENABLED:true}

payment.webhook.signature-secret=${PAYMENT_WEBHOOK_SIGNATURE_SECRET:test-signature-secret}
payment.reconciliation.cron=${PAYMENT_RECONCILIATION_CRON:0 */5 * * * *}
payment.reconciliation.stale-created-seconds=${PAYMENT_RECONCILIATION_STALE_CREATED_SECONDS:1800}

notification.retry.cron=${NOTIFICATION_RETRY_CRON:0 */2 * * * *}
notification.retry.max-attempts=${NOTIFICATION_RETRY_MAX_ATTEMPTS:5}
notification.retry.initial-delay-seconds=${NOTIFICATION_RETRY_INITIAL_DELAY_SECONDS:60}
notification.template.seed-enabled=${NOTIFICATION_TEMPLATE_SEED_ENABLED:true}

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info

security.jwt.secret-base64=${JWT_SECRET_BASE64:QnJhaG1pQmhvamFuU3VwZXJTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkw}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
security.jwt.access-expiration-seconds=${JWT_ACCESS_EXPIRATION_SECONDS:900}

springdoc.swagger-ui.path=/swagger-ui.html

