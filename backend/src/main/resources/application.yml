spring:
  application:
    name: brahmibhojan-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:brahmibhojan}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret-base64: ${JWT_SECRET_BASE64:QnJhaG1pQmhvamFuU3VwZXJTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkw}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

