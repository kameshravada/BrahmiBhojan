spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:brahmibhojandb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

security:
  jwt:
    secret-base64: QnJhaG1pQmhvamFuVGVzdFNlY3JldEtleTEyMzQ1Njc4OTAxMjM0NTY=
    access-expiration-seconds: 900

auth:
  otp:
    return-otp-in-response: true
    request-cooldown-seconds: 1
    rate-limit:
      window-seconds: 3600
      mobile:
        max-requests: 50
      ip:
        max-requests: 200
      device:
        max-requests: 200
      verify-device:
        max-attempts: 200
  refresh-token:
    expiry-seconds: 2592000
    hash-pepper: test-refresh-pepper

inventory:
  default-available-quantity: 100

catalog:
  seed:
    enabled: true

payment:
  webhook:
    signature-secret: test-signature-secret
  reconciliation:
    stale-created-seconds: 1

